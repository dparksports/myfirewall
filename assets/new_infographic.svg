<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%" style="background-color: #0d0f14; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161920"/>
      <stop offset="100%" stop-color="#1e222b"/>
    </linearGradient>

    <!-- Header Background Gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5555" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#8be9fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Connector Lines Gradients -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff5555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8be9fd"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#50fa7b"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffb86c"/>
    </marker>
  </defs>

  <!-- ==================== HEADER ==================== -->
  <g transform="translate(0, 0)">
    <!-- Shield Logo -->
    <path d="M 500 25 L 530 35 L 530 55 C 530 75 515 85 500 90 C 485 85 470 75 470 55 L 470 35 Z" fill="none" stroke="#8be9fd" stroke-width="3" filter="url(#shadow)"/>
    <path d="M 500 30 L 522 37 L 522 53 C 522 68 510 77 500 81 C 490 77 478 68 478 53 L 478 37 Z" fill="#ff5555" opacity="0.8"/>
    <text x="500" y="58" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">✔</text>

    <!-- Main Titles -->
    <text x="500" y="115" fill="#ffffff" font-size="28" font-weight="900" letter-spacing="1.5" text-anchor="middle">MYFIREWALL PLATFORM</text>
    <text x="500" y="140" fill="#8be9fd" font-size="14" font-weight="600" letter-spacing="3" text-anchor="middle">HIGH-FREQUENCY KERNEL TELEMETRY &amp; DIRECT COM ENFORCEMENT</text>
    <line x1="150" y1="155" x2="850" y2="155" stroke="url(#headerGrad)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ==================== LAYER 1: KERNEL SPACE ==================== -->
  <g transform="translate(0, 180)" filter="url(#shadow)">
    <!-- Header/Label -->
    <rect x="50" y="-15" width="200" height="26" rx="6" fill="#ff5555" opacity="0.15"/>
    <rect x="50" y="-15" width="200" height="26" rx="6" fill="none" stroke="#ff5555" stroke-width="1.5"/>
    <text x="150" y="2" fill="#ff5555" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">OS KERNEL SPACE</text>

    <!-- Card 1: Network Trace -->
    <rect x="80" y="25" width="370" height="85" rx="10" fill="url(#cardGrad)" stroke="#ff5555" stroke-width="2"/>
    <text x="110" y="55" fill="#ffffff" font-size="16" font-weight="bold">ETW Network Provider</text>
    <text x="110" y="75" fill="#a0aab8" font-size="12">Microsoft-Windows-Kernel-Network event stream</text>
    <text x="110" y="93" fill="#ff5555" font-size="11" font-weight="bold">Ingests: Connect / Bind / Accept / Close events</text>
    
    <!-- Card 2: Process Monitor -->
    <rect x="550" y="25" width="370" height="85" rx="10" fill="url(#cardGrad)" stroke="#ff5555" stroke-width="2"/>
    <text x="580" y="55" fill="#ffffff" font-size="16" font-weight="bold">ETW Process Monitor</text>
    <text x="580" y="75" fill="#a0aab8" font-size="12">High-performance process lifecycle tracing</text>
    <text x="580" y="93" fill="#ff5555" font-size="11" font-weight="bold">Captures: Spawns, Process Tree exits</text>
  </g>

  <!-- Connectors Layer 1 to Layer 2 -->
  <line x1="265" y1="290" x2="265" y2="335" stroke="#ff5555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>
  <line x1="735" y1="290" x2="735" y2="335" stroke="#ff5555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>

  <!-- ==================== LAYER 2: APP CORE ENGINE ==================== -->
  <g transform="translate(0, 335)" filter="url(#shadow)">
    <!-- Header/Label -->
    <rect x="50" y="-15" width="220" height="26" rx="6" fill="#8be9fd" opacity="0.15"/>
    <rect x="50" y="-15" width="220" height="26" rx="6" fill="none" stroke="#8be9fd" stroke-width="1.5"/>
    <text x="160" y="2" fill="#8be9fd" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">MYFIREWALL CORE ENGINE</text>

    <!-- Card 1: Network Monitor Service -->
    <rect x="80" y="25" width="370" height="110" rx="10" fill="url(#cardGrad)" stroke="#8be9fd" stroke-width="2"/>
    <text x="110" y="55" fill="#ffffff" font-size="16" font-weight="bold">NetworkMonitorService</text>
    <text x="110" y="75" fill="#a0aab8" font-size="12">Maintains in-memory Socket History Cache</text>
    <text x="110" y="93" fill="#8be9fd" font-size="11" font-weight="bold">👻 Resolves PID 0 Ghosting for closed sockets</text>
    <text x="110" y="111" fill="#8be9fd" font-size="11" font-weight="bold">🌐 Integrated Geo-IP (Semaphore throttled)</text>
    
    <!-- Card 2: Process Metadata Service -->
    <rect x="550" y="25" width="370" height="110" rx="10" fill="url(#cardGrad)" stroke="#8be9fd" stroke-width="2"/>
    <text x="580" y="55" fill="#ffffff" font-size="16" font-weight="bold">ProcessMetadataService</text>
    <text x="580" y="75" fill="#a0aab8" font-size="12">Builds real-time spawning tree diagrams</text>
    <text x="580" y="93" fill="#8be9fd" font-size="11" font-weight="bold">🌳 Full Spawning Ancestry resolution</text>
    <text x="580" y="111" fill="#8be9fd" font-size="11" font-weight="bold">🛡 Authenticode Digital Signature Verification</text>
  </g>

  <!-- Connectors Layer 2 to Layer 3 -->
  <!-- Cross routing: Core services push data to both CLI and Desktop frontends -->
  <path d="M 265 470 L 265 505" fill="none" stroke="#8be9fd" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 735 470 L 735 505" fill="none" stroke="#8be9fd" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 265 470 L 710 505" fill="none" stroke="#8be9fd" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
  <path d="M 735 470 L 290 505" fill="none" stroke="#8be9fd" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>

  <!-- ==================== LAYER 3: APP FRONTENDS ==================== -->
  <g transform="translate(0, 505)" filter="url(#shadow)">
    <!-- Header/Label -->
    <rect x="50" y="-15" width="180" height="26" rx="6" fill="#ffb86c" opacity="0.15"/>
    <rect x="50" y="-15" width="180" height="26" rx="6" fill="none" stroke="#ffb86c" stroke-width="1.5"/>
    <text x="140" y="2" fill="#ffb86c" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">USER FRONTENDS</text>

    <!-- Card 1: Console CLI -->
    <rect x="80" y="25" width="370" height="85" rx="10" fill="url(#cardGrad)" stroke="#ffb86c" stroke-width="2"/>
    <text x="110" y="55" fill="#ffffff" font-size="16" font-weight="bold">Spectre.Console CLI App</text>
    <text x="110" y="75" fill="#a0aab8" font-size="12">Interactive, ultra-responsive keyboard panel</text>
    <text x="110" y="93" fill="#ffb86c" font-size="11" font-weight="bold">⚡ Fast Redraws • System Tweaks Menu • Process Kill</text>

    <!-- Card 2: WPF Desktop UI -->
    <rect x="550" y="25" width="370" height="85" rx="10" fill="url(#cardGrad)" stroke="#ffb86c" stroke-width="2"/>
    <text x="580" y="55" fill="#ffffff" font-size="16" font-weight="bold">WPF Desktop Dashboard</text>
    <text x="580" y="75" fill="#a0aab8" font-size="12">Graphical console with slide-out detailed views</text>
    <text x="580" y="93" fill="#ffb86c" font-size="11" font-weight="bold">✨ Anti-flicker Smart-Diffing • Ancestry Drawer</text>
  </g>

  <!-- Connectors Layer 3 to Layer 4 -->
  <path d="M 265 615 L 470 655" fill="none" stroke="#ffb86c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 735 615 L 530 655" fill="none" stroke="#ffb86c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- ==================== LAYER 4: ENFORCEMENT ==================== -->
  <g transform="translate(0, 655)" filter="url(#shadow)">
    <!-- Header/Label -->
    <rect x="50" y="-15" width="220" height="26" rx="6" fill="#50fa7b" opacity="0.15"/>
    <rect x="50" y="-15" width="220" height="26" rx="6" fill="none" stroke="#50fa7b" stroke-width="1.5"/>
    <text x="160" y="2" fill="#50fa7b" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">ZERO-OVERHEAD ENFORCEMENT</text>

    <!-- Card 1: FirewallService / COM Interop / WFP -->
    <rect x="220" y="25" width="560" height="95" rx="10" fill="url(#cardGrad)" stroke="#50fa7b" stroke-width="2"/>
    <text x="250" y="55" fill="#ffffff" font-size="16" font-weight="bold">Native WFP COM Interface (HNetCfg.FwPolicy2)</text>
    <text x="250" y="75" fill="#a0aab8" font-size="12">In-process COM interaction directly targeting the Windows Filtering Platform kernel drivers.</text>
    <text x="250" y="95" fill="#50fa7b" font-size="11" font-weight="bold">⚡ Zero shell invocation overhead (Bypasses netsh/PowerShell) • Instant hardware-level block</text>
  </g>

  <!-- Feedback Line back to top -->
  <path d="M 220 710 L 40 710 L 40 220 L 80 220" fill="none" stroke="#50fa7b" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5" marker-end="url(#arrow-green)"/>
  <text x="50" y="475" fill="#50fa7b" font-size="10" font-weight="bold" transform="rotate(-90, 50, 475)">FEEDBACK BLOCK ENGINE</text>
</svg>

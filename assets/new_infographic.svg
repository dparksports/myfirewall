<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="100%" height="100%" style="background-color: #0b0d12; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Drop Shadow Filters -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d2433" stroke-width="0.7" opacity="0.4"/>
    </pattern>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141822"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>

    <!-- Header Background Gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5555" stop-opacity="0.9"/>
      <stop offset="33%" stop-color="#8be9fd" stop-opacity="0.9"/>
      <stop offset="66%" stop-color="#ffb86c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff5555"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8be9fd"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffb86c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#50fa7b"/>
    </marker>
  </defs>

  <!-- Background grid -->
  <rect width="100%" height="100%" fill="#0b0d12"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Subtle glow behind the enforcement layer -->
  <circle cx="600" cy="850" r="150" fill="#50fa7b" opacity="0.04" filter="url(#glow-green)"/>
  <circle cx="600" cy="450" r="250" fill="#8be9fd" opacity="0.02" filter="url(#glow-cyan)"/>

  <!-- ==================== HEADER ==================== -->
  <g transform="translate(0, 40)">
    <!-- Shield Logo -->
    <path d="M 600 5 L 645 20 L 645 55 C 645 85 622 100 600 108 C 578 100 555 85 555 55 L 555 20 Z" fill="#141822" stroke="#8be9fd" stroke-width="3" filter="url(#shadow)"/>
    <path d="M 600 12 L 635 22 L 635 50 C 635 73 617 87 600 94 C 583 87 565 73 565 50 L 565 22 Z" fill="#ff5555" opacity="0.85"/>
    <text x="600" y="63" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">🛡</text>

    <!-- Titles -->
    <text x="600" y="145" fill="#ffffff" font-size="32" font-weight="900" letter-spacing="2" text-anchor="middle">MYFIREWALL ARCHITECTURE</text>
    <text x="600" y="175" fill="#8be9fd" font-size="15" font-weight="600" letter-spacing="4" text-anchor="middle">ADVANCED KERNEL-LEVEL TCP MONITOR &amp; DIRECT WFP COM ENFORCEMENT</text>
    <line x1="200" y1="195" x2="1000" y2="195" stroke="url(#headerGrad)" stroke-width="2.5" opacity="0.75"/>
  </g>

  <!-- ==================== LAYER 1: WINDOWS KERNEL SPACE ==================== -->
  <g transform="translate(0, 260)" filter="url(#shadow)">
    <!-- Group border/background -->
    <rect x="80" y="-30" width="1040" height="155" rx="15" fill="#11141c" fill-opacity="0.6" stroke="#ff5555" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="110" y="-42" width="220" height="26" rx="6" fill="#ff5555"/>
    <text x="220" y="-25" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">OS KERNEL SPACE (ETW)</text>

    <!-- Card 1: Network Telemetry -->
    <g transform="translate(110, 10)">
      <rect width="450" height="95" rx="10" fill="url(#cardGrad)" stroke="#ff5555" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#ff5555"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">🌐 Kernel Network Provider</text>
      <text x="30" y="60" fill="#a0aab8" font-size="13">Microsoft-Windows-Kernel-Network ETW Stream</text>
      <text x="30" y="78" fill="#ff5555" font-size="12" font-weight="bold">High-frequency Socket Events: Connect, Bind, Accept, Close</text>
    </g>

    <!-- Card 2: Process Telemetry -->
    <g transform="translate(640, 10)">
      <rect width="450" height="95" rx="10" fill="url(#cardGrad)" stroke="#ff5555" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#ff5555"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">🌳 Kernel Process Monitor</text>
      <text x="30" y="60" fill="#a0aab8" font-size="13">Real-time Spawning and Lifecycle Tracing</text>
      <text x="30" y="78" fill="#ff5555" font-size="12" font-weight="bold">High-frequency Process Lifecycles: Create &amp; Exit Events</text>
    </g>
  </g>

  <!-- Connectors L1 -> L2 -->
  <path d="M 335 365 L 335 435" fill="none" stroke="#ff5555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>
  <path d="M 865 365 L 865 435" fill="none" stroke="#ff5555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrow-red)"/>

  <!-- ==================== LAYER 2: MYFIREWALL CORE ENGINE ==================== -->
  <g transform="translate(0, 445)" filter="url(#shadow)">
    <!-- Group border/background -->
    <rect x="80" y="-30" width="1040" height="185" rx="15" fill="#11141c" fill-opacity="0.6" stroke="#8be9fd" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="110" y="-42" width="240" height="26" rx="6" fill="#8be9fd"/>
    <text x="230" y="-25" fill="#0b0d12" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">MYFIREWALL .NET 10 CORE ENGINE</text>

    <!-- Card 1: NetworkMonitorService -->
    <g transform="translate(110, 10)">
      <rect width="450" height="125" rx="10" fill="url(#cardGrad)" stroke="#8be9fd" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#8be9fd"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">📡 NetworkMonitorService</text>
      <text x="30" y="62" fill="#a0aab8" font-size="13">Maintains high-speed in-memory Socket History Cache</text>
      <text x="30" y="82" fill="#8be9fd" font-size="12" font-weight="bold">👻 Attributes PID 0 Ghost Sockets back to true binaries</text>
      <text x="30" y="102" fill="#8be9fd" font-size="12" font-weight="bold">📍 Geo-IP mapping with high-performance Semaphore Throttling</text>
    </g>

    <!-- Card 2: ProcessMetadataService -->
    <g transform="translate(640, 10)">
      <rect width="450" height="125" rx="10" fill="url(#cardGrad)" stroke="#8be9fd" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#8be9fd"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">🪵 ProcessMetadataService</text>
      <text x="30" y="62" fill="#a0aab8" font-size="13">Traces dynamic deep process spawning history diagrams</text>
      <text x="30" y="82" fill="#8be9fd" font-size="12" font-weight="bold">🌿 Reconstructs complete parent-child lineage ancestry chains</text>
      <text x="30" y="102" fill="#8be9fd" font-size="12" font-weight="bold">✍ Authenticode digital signature scanning and validation</text>
    </g>
  </g>

  <!-- Connectors L2 -> L3 -->
  <!-- Fully routed cross-linking connectors -->
  <path d="M 335 600 L 335 660" fill="none" stroke="#8be9fd" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 865 600 L 865 660" fill="none" stroke="#8be9fd" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <path d="M 335 600 L 835 660" fill="none" stroke="#8be9fd" stroke-width="1.5" opacity="0.35" stroke-dasharray="3,3" marker-end="url(#arrow-cyan)"/>
  <path d="M 865 600 L 365 660" fill="none" stroke="#8be9fd" stroke-width="1.5" opacity="0.35" stroke-dasharray="3,3" marker-end="url(#arrow-cyan)"/>

  <!-- ==================== LAYER 3: INTERACTIVE USER FRONTENDS ==================== -->
  <g transform="translate(0, 670)" filter="url(#shadow)">
    <!-- Group border/background -->
    <rect x="80" y="-30" width="1040" height="155" rx="15" fill="#11141c" fill-opacity="0.6" stroke="#ffb86c" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="110" y="-42" width="220" height="26" rx="6" fill="#ffb86c"/>
    <text x="220" y="-25" fill="#0b0d12" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">INTERACTIVE FRONTENDS</text>

    <!-- Card 1: Spectre.Console CLI -->
    <g transform="translate(110, 10)">
      <rect width="450" height="95" rx="10" fill="url(#cardGrad)" stroke="#ffb86c" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#ffb86c"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">⌨ Live Keyboard Console CLI</text>
      <text x="30" y="60" fill="#a0aab8" font-size="13">Ultra-fast Spectre.Console rendering panel</text>
      <text x="30" y="78" fill="#ffb86c" font-size="12" font-weight="bold">Q: Quit • K: Kill • B: Block • I: Ignore • P: Inspect • L: Rules</text>
    </g>

    <!-- Card 2: WPF Desktop UI -->
    <g transform="translate(640, 10)">
      <rect width="450" height="95" rx="10" fill="url(#cardGrad)" stroke="#ffb86c" stroke-width="2"/>
      <rect x="1" y="1" width="448" height="6" rx="3" fill="#ffb86c"/>
      <text x="30" y="38" fill="#ffffff" font-size="18" font-weight="bold">🖥 WPF Windows Dashboard</text>
      <text x="30" y="60" fill="#a0aab8" font-size="13">High-fidelity GUI with deep real-time rendering</text>
      <text x="30" y="78" fill="#ffb86c" font-size="12" font-weight="bold">✨ Anti-flicker Smart-Diffing Grids &amp; Process Lineage Drawer</text>
    </g>
  </g>

  <!-- Connectors L3 -> L4 -->
  <path d="M 335 775 L 565 835" fill="none" stroke="#ffb86c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M 865 775 L 635 835" fill="none" stroke="#ffb86c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- ==================== LAYER 4: ENFORCEMENT LAYER ==================== -->
  <g transform="translate(0, 845)" filter="url(#shadow)">
    <!-- Group border/background -->
    <rect x="80" y="-30" width="1040" height="120" rx="15" fill="#11141c" fill-opacity="0.6" stroke="#50fa7b" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="110" y="-42" width="240" height="26" rx="6" fill="#50fa7b"/>
    <text x="230" y="-25" fill="#0b0d12" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">DIRECT WFP COM ENFORCEMENT</text>

    <!-- Single Main Card: Native COM WFP -->
    <g transform="translate(110, 10)">
      <rect width="980" height="75" rx="10" fill="url(#cardGrad)" stroke="#50fa7b" stroke-width="2"/>
      <rect x="1" y="1" width="978" height="6" rx="3" fill="#50fa7b"/>
      <text x="30" y="35" fill="#ffffff" font-size="18" font-weight="bold">⚡ Native WFP COM In-Process Binding (HNetCfg.FwPolicy2)</text>
      <text x="30" y="55" fill="#a0aab8" font-size="13">Bypasses slow subprocess shell invocations (no netsh.exe or powershell.exe) to inject lightning-fast, zero-overhead blocking rules.</text>
    </g>
  </g>

  <!-- Feedback Loop Arrow from Enforcement back to Kernel -->
  <path d="M 110 892.5 L 40 892.5 L 40 312.5 L 80 312.5" fill="none" stroke="#50fa7b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>
  <text x="55" y="602.5" fill="#50fa7b" font-size="12" font-weight="bold" transform="rotate(-90, 55, 602.5)" letter-spacing="2">FEEDBACK REACTION LOOP</text>
</svg>
